<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#5e35b1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="루틴표">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E🌟%3C/text%3E%3C/svg%3E">
    <title>우리 아이 주간 루틴표</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif;
            background: linear-gradient(135deg, #e3f2fd 0%, #e1bee7 100%);
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 80px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { font-size: 22px; color: #333; margin-bottom: 8px; }
        h2 { font-size: 18px; color: #333; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .subtitle { color: #666; font-size: 13px; margin-bottom: 16px; line-height: 1.4; }

        /* 필터 버튼 */
        .filter-container { display: flex; gap: 8px; margin-bottom: 16px; }
        .filter-btn {
            flex: 1; padding: 12px; border: 2px solid #5e35b1; border-radius: 10px;
            background: white; color: #5e35b1; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .filter-btn.active { background: #5e35b1; color: white; }

        /* 루틴 카드 */
        .routine-card { background: #f8f9fa; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .routine-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .routine-info { display: flex; align-items: center; gap: 8px; }
        .routine-emoji { font-size: 24px; }
        .routine-name { font-size: 15px; font-weight: 600; }
        
        .progress-container { width: 70px; height: 6px; background: #e0e0e0; border-radius: 3px; overflow: hidden; }
        .progress-bar { height: 100%; background: #4caf50; width: 0%; transition: width 0.3s; }

        .routine-trigger { font-size: 11px; color: #777; margin-bottom: 12px; margin-left: 32px; font-style: italic; }

        .days-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .days-grid.seven-days { grid-template-columns: repeat(7, 1fr); }

        .day-box { text-align: center; }
        .day-label { font-size: 10px; font-weight: bold; color: #999; margin-bottom: 4px; }
        .day-box.is-today .day-label { color: #ec407a; }
        
        .day-btn {
            width: 100%; height: 45px; border: 1.5px solid #ddd; border-radius: 8px;
            background: white; display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .day-box.is-today .day-btn { border-color: #ec407a; border-width: 2px; box-shadow: 0 0 8px rgba(236, 64, 122, 0.2); }
        .day-btn.checked { background: #4caf50; border-color: #4caf50; }
        .day-btn.circle { background: #ffc107; border-color: #ffc107; }
        .day-btn.off { background: #eee; border-color: #ddd; color: #ccc; cursor: not-allowed; }

        /* 하단 선택 활동 */
        .activity-btn {
            width: 100%; padding: 12px; margin-bottom: 8px; border: 2px solid #e0e0e0;
            border-radius: 10px; background: white; text-align: left; cursor: pointer; font-size: 14px;
        }
        .activity-btn.selected { background: #ec407a; color: white; border-color: #ec407a; }
        .bridge-btn.selected { background: #5e35b1; color: white; border-color: #5e35b1; }

        /* 가이드 텍스트 */
        .guide-box { background: #fffde7; padding: 12px; border-radius: 10px; border-left: 4px solid #fbc02d; margin-bottom: 16px; font-size: 13px; color: #555; }

        .save-btn { width: 100%; padding: 15px; background: #2196f3; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .reset-btn { margin-top: 20px; background: none; border: none; color: #999; text-decoration: underline; font-size: 12px; width: 100%; cursor: pointer; }

        .popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.85); color: white; padding: 15px 25px; border-radius: 30px; display: none; z-index: 1000; text-align: center; }
        
        .checkmark { width: 20px; height: 20px; stroke: white; stroke-width: 4; fill: none; }
        .circle-icon { width: 16px; height: 16px; border: 3px solid white; border-radius: 50%; }
        
        textarea { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; resize: none; font-family: inherit; margin-top: 5px; }
    </style>
</head>
<body>
    <div id="popup" class="popup"></div>
    
    <div class="container">
        <div class="card">
            <h1>🌟 우리 아이 루틴표</h1>
            <div class="subtitle">"완벽하지 않아도 괜찮아, 어제보다 조금 더 나아가면 충분해!"</div>
            <div class="filter-container">
                <button id="viewAll" class="filter-btn active" onclick="setFilter('all')">전체 루틴</button>
                <button id="viewToday" class="filter-btn" onclick="setFilter('today')">오늘만 집중</button>
            </div>
        </div>

        <div id="guideSection" class="card">
            <h2>💡 루틴이 힘들 때는?</h2>
            <div class="guide-box">
                • <b>하나만 하기:</b> 너무 힘들면 딱 한 가지만 정해서 해보자.<br>
                • <b>작게 쪼개기:</b> 30분이 힘들면 5분만 해보는 거야.<br>
                • <b>도움 요청하기:</b> 엄마, 아빠에게 "같이 해요"라고 말해줘.
            </div>
        </div>

        <div id="routineList"></div>

        <div class="card" style="border-left: 4px solid #ec407a;">
            <h2>✨ 토요일 특별 활동</h2>
            <div class="subtitle">두 개까지 골라도 돼. 아무것도 안 해도 괜찮아!</div>
            <div id="saturdayActivities"></div>
        </div>

        <div class="card" style="border-left: 4px solid #5e35b1;">
            <h2>🌉 일요일 브릿지 (10분)</h2>
            <div class="subtitle">월요일의 문을 살짝 열어두는 거야. 하나만 선택!</div>
            <div id="sundayBridges"></div>
        </div>

        <div class="card">
            <h2>💭 이번 주 한마디</h2>
            <textarea id="weeklyNote" rows="3" placeholder="이번 주에 가장 뿌듯했던 일은 뭐였니?"></textarea>
            <button class="save-btn" onclick="sendWeeklyEmail()">📧 기록 저장 및 메일 보내기</button>
            <button class="reset-btn" onclick="resetAll()">새로운 주를 위해 초기화하기</button>
        </div>
    </div>

    <script>
        const weekdayList = ['월', '화', '수', '목', '금'];
        const fullWeekList = ['월', '화', '수', '목', '금', '토', '일'];
        
        const rawToday = new Date().getDay();
        const todayIdx = rawToday === 0 ? 6 : rawToday - 1; 
        const todayName = fullWeekList[todayIdx];

        const routines = [
            { id: 'english', name: '영어도서관 30분', emoji: '📚', trigger: '아침밥 먹으면서' },
            { id: 'backpack', name: '책가방 비우기', emoji: '🎒', trigger: '학교 다녀와서 곧장' },
            { id: 'math', name: '핀란드 수학', emoji: '🔢', trigger: '간식 먹으면서', offDays: [4] },
            { id: 'reading', name: '책 읽기', emoji: '📖', trigger: '자유시간 또는 식사 전', weekendEnabled: true },
            { id: 'ringfit', name: '운동 (러닝/링핏)', emoji: '🏃', trigger: '식후 한 시간 뒤', weekendEnabled: true }
        ];

        const satItems = ['보드게임', '그림 그리기', '만들기 활동', '도서관 가기', '예능 시청'];
        const sunItems = ['영어도서관', 'ORT 읽기', '수학 1문제', '책 4페이지'];

        let data = JSON.parse(localStorage.getItem('routineData')) || { routines: {}, weekend: [], bridge: '', note: '' };
        let currentFilter = 'all';

        function setFilter(filter) {
            currentFilter = filter;
            document.getElementById('viewAll').classList.toggle('active', filter === 'all');
            document.getElementById('viewToday').classList.toggle('active', filter === 'today');
            document.getElementById('guideSection').style.display = filter === 'today' ? 'block' : 'none';
            render();
        }

        function toggle(id, day) {
            const key = `${id}-${day}`;
            const current = data.routines[key] || 'empty';
            const next = current === 'empty' ? 'checked' : (current === 'checked' ? 'circle' : 'empty');
            data.routines[key] = next;
            save();
            render();
            if(next !== 'empty') showPopup(next === 'checked' ? "대단해! 별이 하나 늘었어 🌟" : "조금이라도 한 게 어디야! 멋져 💛");
        }

        function toggleSat(item) {
            const idx = data.weekend.indexOf(item);
            if (idx > -1) data.weekend.splice(idx, 1);
            else if (data.weekend.length < 2) data.weekend.push(item);
            save(); render();
        }

        function setBridge(item) {
            data.bridge = data.bridge === item ? '' : item;
            save(); render();
        }

        function save() {
            data.note = document.getElementById('weeklyNote').value;
            localStorage.setItem('routineData', JSON.stringify(data));
        }

        function showPopup(msg) {
            const p = document.getElementById('popup');
            p.textContent = msg; p.style.display = 'block';
            setTimeout(() => p.style.display = 'none', 1500);
        }

        function render() {
            const list = document.getElementById('routineList');
            list.innerHTML = '';
            document.getElementById('weeklyNote').value = data.note || '';

            routines.forEach(r => {
                const targetDays = r.weekendEnabled ? fullWeekList : weekdayList;
                if (currentFilter === 'today' && !targetDays.includes(todayName)) return;

                const completed = targetDays.filter(d => data.routines[`${r.id}-${d}`] === 'checked' || data.routines[`${r.id}-${d}`] === 'circle').length;
                const progress = (completed / targetDays.length) * 100;

                const card = document.createElement('div');
                card.className = 'card routine-card';
                
                let daysHtml = '';
                targetDays.forEach((d, i) => {
                    const isToday = d === todayName;
                    if (currentFilter === 'today' && !isToday) return;

                    const state = data.routines[`${r.id}-${d}`] || 'empty';
                    const isOff = r.offDays?.includes(i);
                    
                    daysHtml += `
                        <div class="day-box ${isToday ? 'is-today' : ''}">
                            <div class="day-label">${d}</div>
                            <button class="day-btn ${isOff ? 'off' : state}" ${isOff ? 'disabled' : `onclick="toggle('${r.id}','${d}')"`}>
                                ${state === 'checked' ? '<svg class="checkmark" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>' : 
                                  state === 'circle' ? '<div class="circle-icon"></div>' : (isOff ? 'OFF' : '')}
                            </button>
                        </div>`;
                });

                card.innerHTML = `
                    <div class="routine-header">
                        <div class="routine-info">
                            <span class="routine-emoji">${r.emoji}</span>
                            <span class="routine-name">${r.name}</span>
                        </div>
                        <div class="progress-container"><div class="progress-bar" style="width: ${progress}%"></div></div>
                    </div>
                    <div class="routine-trigger">⏰ ${r.trigger}</div>
                    <div class="days-grid ${r.weekendEnabled ? 'seven-days' : ''}">${daysHtml}</div>
                `;
                list.appendChild(card);
            });

            // 토요일/일요일 렌더링
            document.getElementById('saturdayActivities').innerHTML = satItems.map(item => `
                <button class="activity-btn ${data.weekend.includes(item) ? 'selected' : ''}" onclick="toggleSat('${item}')">${item}</button>
            `).join('');

            document.getElementById('sundayBridges').innerHTML = sunItems.map(item => `
                <button class="activity-btn bridge-btn ${data.bridge === item ? 'selected' : ''}" onclick="setBridge('${item}')">${item}</button>
            `).join('');
        }

        function resetAll() {
            if(confirm("모든 기록을 초기화할까요? 새로운 한 주가 시작됩니다!")) {
                data = { routines: {}, weekend: [], bridge: '', note: '' };
                save(); render();
            }
        }

        function sendWeeklyEmail() {
            save();
            let body = `📊 이번 주 루틴 보고서\n\n[성찰]\n${data.note || '입력 없음'}\n\n[특별 활동]\n토요일: ${data.weekend.join(', ') || '없음'}\n일요일: ${data.bridge || '없음'}\n\n[체크 기록]\n`;
            routines.forEach(r => {
                const targetDays = r.weekendEnabled ? fullWeekList : weekdayList;
                const checks = targetDays.map(d => d + (data.routines[`${r.id}-${d}`] === 'checked' ? '✅' : (data.routines[`${r.id}-${d}`] === 'circle' ? '⭕' : '❌'))).join(' ');
                body += `${r.emoji} ${r.name}: ${checks}\n`;
            });
            window.location.href = `mailto:?subject=주간 루틴 기록&body=${encodeURIComponent(body)}`;
        }

        render();
    </script>
</body>
</html>
