<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#5e35b1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="루틴표">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E🌟%3C/text%3E%3C/svg%3E">
    <title>우리 아이 주간 루틴표</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif;
            background: linear-gradient(135deg, #e3f2fd 0%, #e1bee7 100%);
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 80px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { font-size: 22px; color: #333; margin-bottom: 8px; }
        h2 { font-size: 18px; color: #333; margin-bottom: 12px; }
        
        /* 필터 버튼 스타일 */
        .filter-container {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .filter-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #5e35b1;
            border-radius: 10px;
            background: white;
            color: #5e35b1;
            font-weight: bold;
            cursor: pointer;
        }
        .filter-btn.active {
            background: #5e35b1;
            color: white;
        }

        .routine-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            position: relative;
        }
        .routine-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .routine-info { display: flex; align-items: center; gap: 8px; }
        .routine-emoji { font-size: 24px; }
        .routine-name { font-size: 15px; font-weight: 600; }
        
        /* 진행률 바 스타일 */
        .progress-container {
            width: 80px;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: #4caf50;
            width: 0%;
            transition: width 0.3s ease;
        }

        .routine-trigger {
            font-size: 11px;
            color: #777;
            margin-bottom: 12px;
            margin-left: 32px;
        }

        .days-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .days-grid.seven-days { grid-template-columns: repeat(7, 1fr); }

        .day-box { text-align: center; }
        .day-label { font-size: 10px; font-weight: bold; color: #999; margin-bottom: 4px; }
        
        /* 오늘 하이라이트 스타일 */
        .day-box.is-today .day-label { color: #ec407a; font-size: 11px; }
        
        .day-btn {
            width: 100%;
            height: 45px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .day-box.is-today .day-btn { border-color: #ec407a; border-width: 2px; background: #fff5f8; }
        
        .day-btn.checked { background: #4caf50; border-color: #4caf50; }
        .day-btn.circle { background: #ffc107; border-color: #ffc107; }
        .day-btn.off { background: #eee; border-color: #ddd; color: #ccc; cursor: not-allowed; }

        .checkmark { width: 20px; height: 20px; stroke: white; stroke-width: 4; fill: none; }
        .circle-icon { width: 16px; height: 16px; border: 3px solid white; border-radius: 50%; }

        .save-btn {
            width: 100%;
            padding: 14px;
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }
        .reset-btn {
            margin-top: 20px;
            background: none;
            border: none;
            color: #999;
            text-decoration: underline;
            font-size: 12px;
            width: 100%;
            cursor: pointer;
        }

        .popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); color: white; padding: 15px 25px;
            border-radius: 30px; display: none; z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="popup" class="popup"></div>
    
    <div class="container">
        <div class="card">
            <h1>🌟 우리 아이 루틴표</h1>
            <div class="filter-container">
                <button id="viewAll" class="filter-btn active" onclick="setFilter('all')">전체 보기</button>
                <button id="viewToday" class="filter-btn" onclick="setFilter('today')">오늘 것만 보기</button>
            </div>
        </div>

        <div id="routineList"></div>

        <div class="card">
            <button class="save-btn" onclick="sendEmail()">📧 이번 주 기록 보내기</button>
            <button class="reset-btn" onclick="resetAll()">기록 초기화하기</button>
        </div>
    </div>

    <script>
        const weekdayList = ['월', '화', '수', '목', '금'];
        const fullWeekList = ['월', '화', '수', '목', '금', '토', '일'];
        
        // 오늘 요일 인덱스 (0:일, 1:월 ... 6:토) -> 루틴표 기준 (월:0 ~ 일:6) 재배치
        const rawToday = new Date().getDay();
        const todayIdx = rawToday === 0 ? 6 : rawToday - 1; 
        const todayName = fullWeekList[todayIdx];

        const routines = [
            { id: 'english', name: '영어도서관 30분', emoji: '📚', trigger: '아침밥 먹으면서', category: 'morning' },
            { id: 'backpack', name: '책가방 비우기', emoji: '🎒', trigger: '학교 다녀와서 곧장', category: 'afternoon' },
            { id: 'math', name: '핀란드 수학', emoji: '🔢', trigger: '간식 먹으면서', category: 'afternoon', offDays: [4] },
            { id: 'reading', name: '책 읽기', emoji: '📖', trigger: '자유시간/식사 전', category: 'afternoon', weekendEnabled: true },
            { id: 'ringfit', name: '운동 (러닝/링핏)', emoji: '🏃', trigger: '식후 한 시간 뒤', category: 'evening', weekendEnabled: true }
        ];

        let data = JSON.parse(localStorage.getItem('routineData')) || { routines: {} };
        let currentFilter = 'all';

        function setFilter(filter) {
            currentFilter = filter;
            document.getElementById('viewAll').classList.toggle('active', filter === 'all');
            document.getElementById('viewToday').classList.toggle('active', filter === 'today');
            render();
        }

        function toggle(id, day) {
            const key = `${id}-${day}`;
            const current = data.routines[key] || 'empty';
            const next = current === 'empty' ? 'checked' : (current === 'checked' ? 'circle' : 'empty');
            data.routines[key] = next;
            localStorage.setItem('routineData', JSON.stringify(data));
            render();
            if(next !== 'empty') showPopup(next === 'checked' ? "멋져요! 완벽해요 🌟" : "노력하는 모습이 아름다워요 💛");
        }

        function showPopup(msg) {
            const p = document.getElementById('popup');
            p.textContent = msg; p.style.display = 'block';
            setTimeout(() => p.style.display = 'none', 1500);
        }

        function render() {
            const list = document.getElementById('routineList');
            list.innerHTML = '';

            routines.forEach(r => {
                const targetDays = r.weekendEnabled ? fullWeekList : weekdayList;
                
                // 오늘 것만 보기 필터링: 주말 미포함 루틴인데 오늘이 주말이면 제외
                if (currentFilter === 'today' && !targetDays.includes(todayName)) return;

                // 진행률 계산
                const completed = targetDays.filter(d => data.routines[`${r.id}-${d}`] === 'checked' || data.routines[`${r.id}-${d}`] === 'circle').length;
                const progress = (completed / targetDays.length) * 100;

                const card = document.createElement('div');
                card.className = 'card routine-card';
                
                let daysHtml = '';
                targetDays.forEach((d, i) => {
                    const isToday = d === todayName;
                    // 필터가 'today'일 때는 오늘 요일만 렌더링
                    if (currentFilter === 'today' && !isToday) return;

                    const state = data.routines[`${r.id}-${d}`] || 'empty';
                    const isOff = r.offDays?.includes(i);
                    
                    daysHtml += `
                        <div class="day-box ${isToday ? 'is-today' : ''}">
                            <div class="day-label">${d}</div>
                            <button class="day-btn ${isOff ? 'off' : state}" ${isOff ? 'disabled' : `onclick="toggle('${r.id}','${d}')"`}>
                                ${state === 'checked' ? '<svg class="checkmark" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>' : 
                                  state === 'circle' ? '<div class="circle-icon"></div>' : (isOff ? 'OFF' : '')}
                            </button>
                        </div>`;
                });

                card.innerHTML = `
                    <div class="routine-header">
                        <div class="routine-info">
                            <span class="routine-emoji">${r.emoji}</span>
                            <span class="routine-name">${r.name}</span>
                        </div>
                        <div class="progress-container">
                            <div class="progress-bar" style="width: ${progress}%"></div>
                        </div>
                    </div>
                    <div class="routine-trigger">⏰ ${r.trigger}</div>
                    <div class="days-grid ${r.weekendEnabled ? 'seven-days' : ''}">
                        ${daysHtml}
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function resetAll() {
            if(confirm("정말로 모든 기록을 지울까요? 새로운 주가 시작되었나요?")) {
                data.routines = {};
                localStorage.setItem('routineData', JSON.stringify(data));
                render();
            }
        }

        function sendEmail() {
            let body = "📊 이번 주 루틴 결과\n\n";
            routines.forEach(r => {
                const targetDays = r.weekendEnabled ? fullWeekList : weekdayList;
                const done = targetDays.filter(d => data.routines[`${r.id}-${d}`] === 'checked').join(', ');
                const partial = targetDays.filter(d => data.routines[`${r.id}-${d}`] === 'circle').join(', ');
                body += `${r.emoji} ${r.name}\n - 완료: ${done || '없음'}\n - 노력: ${partial || '없음'}\n\n`;
            });
            window.location.href = `mailto:?subject=루틴 보고서&body=${encodeURIComponent(body)}`;
        }

        render();
    </script>
</body>
</html>
