<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#5e35b1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="루틴표">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E🌟%3C/text%3E%3C/svg%3E">
    <title>우리 아이 주간 루틴표</title>
    <style>
        /* 기존 스타일 유지 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif;
            background: linear-gradient(135deg, #e3f2fd 0%, #e1bee7 100%);
            min-height: 100vh;
            padding: 16px;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: 80px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { font-size: 24px; color: #333; margin-bottom: 8px; text-align: center; }
        h2 { font-size: 18px; color: #333; margin-bottom: 12px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 16px; text-align: center; }
        
        .routine-card { background: #f8f9fa; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .routine-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .routine-emoji { font-size: 28px; }
        .routine-name { font-size: 16px; font-weight: 600; color: #333; }
        .routine-trigger { font-size: 12px; color: #666; font-style: italic; margin-left: 36px; margin-bottom: 12px; }
        
        .days-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .days-grid.seven-days { grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .day-box { text-align: center; }
        .day-label { font-size: 12px; font-weight: 600; color: #5e35b1; margin-bottom: 4px; }
        .day-btn {
            width: 100%; height: 60px; border: 2px solid #ddd; border-radius: 12px;
            background: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 12px; transition: all 0.2s;
        }
        .day-btn.checked { background: #4caf50; border-color: #4caf50; }
        .day-btn.circle { background: #ffc107; border-color: #ffc107; }
        .day-btn.sick { background: #5c6bc0; border-color: #3949ab; color: white; font-size: 24px; }
        .day-btn.off { background: #e0e0e0; border-color: #ccc; color: #999; cursor: not-allowed; }
        
        /* 섹션 헤더 스타일 */
        .section-header { display: inline-block; padding: 8px 16px; border-radius: 8px; font-weight: 600; font-size: 14px; margin-bottom: 12px; }
        .morning { background: #fff9c4; color: #f57f17; }
        .afternoon { background: #ffe0b2; color: #e65100; }
        
        /* 칭찬 스탬프 효과 */
        .stamp-overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(5);
            opacity: 0; pointer-events: none; z-index: 2000; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #d32f2f; border: 8px solid #d32f2f; padding: 10px 20px; border-radius: 15px;
            font-size: 40px; font-weight: 900; text-transform: uppercase; transform-origin: center;
            background: rgba(255,255,255,0.8); box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }
        .stamp-overlay.active { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(-15deg); }

        /* 다채로운 컨페티 */
        .confetti { position: fixed; width: 10px; height: 10px; z-index: 1500; top: -10px; pointer-events: none; }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* 주말 및 기타 스타일 */
        .activity-btn { width: 100%; padding: 14px; margin-bottom: 8px; border: 2px solid #e0e0e0; border-radius: 12px; background: white; text-align: left; cursor: pointer; }
        .activity-btn.selected { background: #ec407a; color: white; border-color: #ec407a; }
        .bridge-btn.selected { background: #5e35b1; color: white; border-color: #5e35b1; }
        input[type="text"] { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; margin-bottom: 12px; }
        .save-btn { width: 100%; padding: 14px; background: #4caf50; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 8px; }
        .popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); color: white; padding: 20px 30px; border-radius: 50px; display: none; z-index: 3000; text-align: center; font-weight: bold; border: 2px solid #fff; }
        .checkmark { width: 28px; height: 28px; stroke: white; stroke-width: 4; fill: none; }
        .circle-icon { width: 24px; height: 24px; border: 4px solid white; border-radius: 50%; }
    </style>
</head>
<body>
    <div id="popup" class="popup"></div>
    <div id="stamp" class="stamp-overlay">참 잘했어요!</div>
    
    <div class="container">
        <div class="card">
            <h1>⭐ 우리 아이 주간 루틴표</h1>
            <div class="subtitle">✨ "오늘의 노력이 내일의 멋진 네가 될 거야!"</div>
        </div>

        <div id="monthlyGrowth" class="card" style="display:none; border-left: 4px solid #9c27b0;">
            <h2>🌱 이번 달 성장 기록</h2>
            <label>1개월 전에 비해 더 쉬워진 것:</label><input type="text" id="monthlyEasier">
            <label>새로 할 수 있게 된 것:</label><input type="text" id="monthlyNew">
            <button class="save-btn" onclick="saveMonthlyGrowth()">저장하기</button>
        </div>

        <div class="card">
            <div class="section-header morning">🌅 아침 루틴</div>
            <div id="morningRoutines"></div>
            <div class="section-header afternoon">☀️ 오후 루틴</div>
            <div id="afternoonRoutines"></div>
        </div>

        <div class="card" style="border-left: 4px solid #00bcd4;">
            <h2>🌧️ 오늘 루틴이 힘들 때는?</h2>
            <p style="font-size: 13px; color: #666;">하나만 골라 하기 / 5분만 하기 / ⭕ 표시하기</p>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div class="card" style="border-left: 4px solid #ec407a;">
                <h2>✨ 토요일 특별 활동</h2>
                <div id="saturdayActivities"></div>
            </div>
            <div class="card" style="border-left: 4px solid #5e35b1;">
                <h2>🌉 일요일 브릿지</h2>
                <div id="sundayBridges"></div>
            </div>
        </div>

        <div class="card" style="border-left: 4px solid #4caf50;">
            <h2>💭 이번 주 생각</h2>
            <input type="text" id="weeklyEasy" placeholder="제일 쉬웠던 것">
            <input type="text" id="weeklyHard" placeholder="힘들었던 것">
            <button class="save-btn" onclick="saveWeeklyReflection()">저장하기</button>
            <button class="save-btn" onclick="sendWeeklyEmail()" style="background: #2196f3;">📧 기록 메일 보내기</button>
            <button class="save-btn" onclick="manualResetRoutines()" style="background: #999; margin-top: 20px;">🔄 초기화</button>
        </div>
    </div>

    <script>
        const days = ['월', '화', '수', '목', '금'];
        const fullWeek = ['월', '화', '수', '목', '금', '토', '일'];
        
        const routines = {
            morning: [{ id: 'english', name: '영어도서관 30분', emoji: '📚', trigger: '아침밥 먹으면서' }],
            afternoon: [
                { id: 'backpack', name: '책가방 비우기', emoji: '🎒', trigger: '학교 다녀와서 곧장' },
                { id: 'math', name: '핀란드 수학 교과서', emoji: '🔢', trigger: '하교 후 간식 먹으면서', offDays: [4] },
                { id: 'mathreview', name: '학교 수학 복습', emoji: '📐', trigger: '간식 시간 활용', offDays: [0, 1, 2, 3] },
                { id: 'ort', name: '집중듣기 30분', emoji: '🎧', trigger: '수하기 끝나면', offDays: [4] },
                { id: 'hanja', name: '한자 2페이지', emoji: '✍️', trigger: '집중듣기 끝나면', offDays: [1, 3] },
                { id: 'reading', name: '책 읽기', emoji: '📖', trigger: '평일 오후/주말', weekendEnabled: true },
                { id: 'ringfit', name: '운동 (러닝/링핏)', emoji: '🏃', trigger: '식후 한 시간 뒤', weekendEnabled: true, allowSick: true }
            ]
        };

        const satItems = ['보드게임', '물감 놀이', '만들기', '도서관', '예능 시청'];
        const sunItems = ['영어도서관', 'ORT', '수학 1문제', '책 4페이지'];
        const msgs = ["대단해! 🌟", "해냈구나! 👍", "최고야! 😊", "멋진데? ✨"];

        let data = JSON.parse(localStorage.getItem('routineData')) || { routines: {}, weekend: [], bridge: '', weekly: {}, monthly: {} };

        // 다채로운 컨페티 효과 추가
        function createConfetti() {
            const shapes = ['square', 'circle', 'star'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                const shape = shapes[Math.floor(Math.random() * shapes.length)];
                
                if (shape === 'star') {
                    confetti.innerHTML = '⭐'; confetti.style.fontSize = '15px';
                } else if (shape === 'circle') {
                    confetti.style.borderRadius = '50%';
                }
                
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = shape === 'star' ? 'transparent' : `hsl(${Math.random() * 360}, 70%, 60%)`;
                confetti.style.animation = `fall ${Math.random() * 2 + 1}s linear forwards`;
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 3000);
            }
        }

        // 칭찬 스탬프 효과 추가
        function triggerStamp() {
            const stamp = document.getElementById('stamp');
            stamp.classList.add('active');
            setTimeout(() => stamp.classList.remove('active'), 1000);
        }

        function toggle(id, day, allowSick) {
            const key = id + '-' + day;
            const state = data.routines[key] || 'empty';
            
            if (state === 'empty') {
                data.routines[key] = 'checked';
                createConfetti(); triggerStamp(); showMsg(msgs[Math.floor(Math.random() * msgs.length)]);
            } else if (state === 'checked') {
                data.routines[key] = 'circle';
            } else if (state === 'circle' && allowSick) {
                data.routines[key] = 'sick';
                showMsg("푹 쉬고 빨리 나으자! 🤒");
            } else {
                data.routines[key] = 'empty';
            }
            save(); render();
        }

        function showMsg(m) { const p = document.getElementById('popup'); p.textContent = m; p.style.display = 'block'; setTimeout(() => p.style.display = 'none', 2000); }
        function save() { localStorage.setItem('routineData', JSON.stringify(data)); }

        function createRoutine(r) {
            let daysList = r.weekendEnabled ? fullWeek : days;
            let html = `<div class="routine-card"><div class="routine-header"><span class="routine-emoji">${r.emoji}</span><span class="routine-name">${r.name}</span></div><div class="routine-trigger">⏰ ${r.trigger}</div><div class="days-grid ${r.weekendEnabled ? 'seven-days' : ''}">`;
            
            daysList.forEach((d, i) => {
                const isOff = r.offDays && r.offDays.includes(fullWeek.indexOf(d));
                const state = data.routines[r.id + '-' + d] || 'empty';
                const cls = isOff ? 'off' : state;
                let content = isOff ? 'OFF' : (state === 'checked' ? '✅' : (state === 'circle' ? '⭕' : (state === 'sick' ? '🤒' : '')));
                html += `<div class="day-box"><div class="day-label">${d}</div><button class="day-btn ${cls}" ${isOff ? 'disabled' : `onclick="toggle('${r.id}','${d}', ${r.allowSick})"`}>${content}</button></div>`;
            });
            return html + '</div></div>';
        }

        function render() {
            document.getElementById('morningRoutines').innerHTML = routines.morning.map(createRoutine).join('');
            document.getElementById('afternoonRoutines').innerHTML = routines.afternoon.map(createRoutine).join('');
            document.getElementById('saturdayActivities').innerHTML = satItems.map(a => `<button class="activity-btn ${data.weekend.includes(a) ? 'selected' : ''}" onclick="toggleWeekend('${a}')">${a}</button>`).join('');
            document.getElementById('sundayBridges').innerHTML = sunItems.map(b => `<button class="activity-btn bridge-btn ${data.bridge === b ? 'selected' : ''}" onclick="setBridge('${b}')">${b}</button>`).join('');
        }

        function toggleWeekend(a) { const i = data.weekend.indexOf(a); if(i > -1) data.weekend.splice(i, 1); else if(data.weekend.length < 2) { data.weekend.push(a); createConfetti(); } save(); render(); }
        function setBridge(b) { data.bridge = data.bridge === b ? '' : b; if(data.bridge) { createConfetti(); triggerStamp(); } save(); render(); }
        function saveWeeklyReflection() { data.weekly = { easy: document.getElementById('weeklyEasy').value, hard: document.getElementById('weeklyHard').value }; save(); alert('저장 완료!'); }
        
        function manualResetRoutines() {
            if (confirm('모든 기록을 초기화할까요?')) {
                data.routines = {}; data.weekend = []; data.bridge = ''; data.weekly = {};
                save(); render();
            }
        }

        function sendWeeklyEmail() {
            const body = `이번 주 루틴 결과!\n체크: ${Object.values(data.routines).filter(v => v === 'checked').length}개\n쉬웠던 것: ${data.weekly.easy || '-'}`;
            window.location.href = `mailto:?subject=[루틴표] 기록&body=${encodeURIComponent(body)}`;
        }

        // 초기 실행
        const today = new Date();
        if (today.getDay() === 0) document.getElementById('monthlyGrowth').style.display = 'block';
        render();
    </script>
</body>
</html>
